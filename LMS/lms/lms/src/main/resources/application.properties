# =========================
# APPLICATION NAME
# =========================
spring.application.name=rcc-lms

# =========================
# DATABASE CONFIG
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/rcc
spring.datasource.username=root
spring.datasource.password=1234

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Force Hibernate to use the exact names in @Column annotations
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Prevents Hibernate from trying to validate or create tables incorrectly
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# =========================
# SERVER PORT
# =========================
server.port=8080
